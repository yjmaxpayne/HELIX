minimum_pre_commit_version: "4.5.0"

default_language_version:
  python: python3.11

default_install_hook_types:
  - pre-commit
  - commit-msg

ci:
  autoupdate_schedule: monthly

exclude: |
  (?x)^(
    build/|
    dist/|
    doc/build/|
    doc/_doxygen/|
    helix_docs\.egg-info/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.2
    hooks:
      - id: clang-format
        name: clang-format C++/CUDA (manual)
        stages: [manual]
        files: ^(src|tests)/.*\.(c|cc|cpp|cxx|h|hpp|hh|cu|cuh)$
        types_or: [c++, c, cuda]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.15.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: bash-syntax
        name: bash -n
        entry: bash -n
        language: system
        types: [shell]

      - id: helix-generated-output-guard
        name: forbid generated HELIX run outputs
        entry: scripts/check_no_generated_outputs.sh
        language: script
        files: (^|/)(output\.txt|outputEnergy\.txt|output_rho[0-9]+\.txt|snapshot_rho[0-9]+\.dat)$
        exclude: ^examples/outputEnergy\.txt$
