name: Numerical Baseline

on:
  workflow_dispatch:
    inputs:
      helix_steps:
        description: HELIX_STEPS value for the baseline run
        required: true
        default: "1000"
        type: string
      cuda_architectures:
        description: CMake CUDA architecture list
        required: true
        default: "89"
        type: string
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: numerical-baseline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  numerical-baseline:
    name: Full example baseline on CUDA runner
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      HELIX_STEPS: ${{ github.event.inputs.helix_steps || '1000' }}
      HELIX_CUDA_ARCHITECTURES: ${{ github.event.inputs.cuda_architectures || '89' }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Configure CUDA 13.2 toolkit environment
        run: |
          CUDA_DIR=/usr/local/cuda-13.2
          if [[ ! -x "${CUDA_DIR}/bin/nvcc" ]]; then
            echo "Expected CUDA 13.2 toolkit at ${CUDA_DIR}/bin/nvcc but it is missing." >&2
            exit 1
          fi
          echo "${CUDA_DIR}/bin" >> "${GITHUB_PATH}"
          {
            echo "CUDA_HOME=${CUDA_DIR}"
            echo "CUDA_PATH=${CUDA_DIR}"
            echo "CUDACXX=${CUDA_DIR}/bin/nvcc"
            echo "LD_LIBRARY_PATH=${CUDA_DIR}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Show GPU and CUDA tools
        run: |
          nvidia-smi
          nvcc --version
          cmake --version

      - name: Build and verify full example baseline
        run: scripts/verify_examples.sh
        env:
          HELIX_BUILD_DIR: ${{ runner.temp }}/helix-baseline-build
          HELIX_RUN_DIR: ${{ runner.temp }}/helix-baseline-run

      - name: Upload baseline outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: numerical-baseline-output
          path: |
            ${{ runner.temp }}/helix-baseline-run/output*.txt
            ${{ runner.temp }}/helix-baseline-run/snapshot_rho*.dat
            ${{ runner.temp }}/helix-baseline-run/energy_compare_summary.txt
          if-no-files-found: ignore
          retention-days: 14
