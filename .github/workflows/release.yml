name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish
        required: true
        type: string
      cuda_architectures:
        description: CMake CUDA architecture list
        required: true
        default: "89"
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    name: Build, verify, and package CUDA release
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      HELIX_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      HELIX_STEPS: "1000"
      HELIX_CUDA_ARCHITECTURES: ${{ github.event.inputs.cuda_architectures || '89' }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, optionally with a prerelease suffix." >&2
            exit 1
          fi

      - name: Configure CUDA 13.2 toolkit environment
        run: |
          CUDA_DIR=/usr/local/cuda-13.2
          if [[ ! -x "${CUDA_DIR}/bin/nvcc" ]]; then
            echo "Expected CUDA 13.2 toolkit at ${CUDA_DIR}/bin/nvcc but it is missing." >&2
            exit 1
          fi
          echo "${CUDA_DIR}/bin" >> "${GITHUB_PATH}"
          {
            echo "CUDA_HOME=${CUDA_DIR}"
            echo "CUDA_PATH=${CUDA_DIR}"
            echo "CUDACXX=${CUDA_DIR}/bin/nvcc"
            echo "LD_LIBRARY_PATH=${CUDA_DIR}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Show GPU and CUDA tools
        run: |
          nvidia-smi
          nvcc --version
          cmake --version

      - name: Build and verify full example baseline
        run: scripts/verify_examples.sh
        env:
          HELIX_BUILD_DIR: ${{ runner.temp }}/helix-release-build
          HELIX_RUN_DIR: ${{ runner.temp }}/helix-release-run

      - name: Package release
        run: scripts/package_release.sh "${RELEASE_TAG}"
        env:
          HELIX_BUILD_DIR: ${{ runner.temp }}/helix-release-build
          HELIX_DIST_DIR: ${{ runner.temp }}/helix-dist

      - name: Attest release package
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/helix-dist/*.tar.gz

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: helix-release-package
          path: |
            ${{ runner.temp }}/helix-dist/*.tar.gz
            ${{ runner.temp }}/helix-dist/*.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload release verification outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: helix-release-verification-output
          path: |
            ${{ runner.temp }}/helix-release-run/output*.txt
            ${{ runner.temp }}/helix-release-run/snapshot_rho*.dat
          if-no-files-found: ignore
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: helix-release-package
          path: dist

      - name: Publish release
        run: |
          prerelease_args=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GH_REPO}"
            gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --draft=false "${prerelease_args[@]}"
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "HELIX ${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
