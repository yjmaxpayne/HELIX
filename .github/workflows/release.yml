name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish
        required: true
        type: string
      cuda_architectures:
        description: CMake CUDA architecture list
        required: true
        default: "89"
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    name: Build, verify, and package CUDA release
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      HELIX_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      HELIX_STEPS: "1000"
      HELIX_CUDA_ARCHITECTURES: ${{ github.event.inputs.cuda_architectures || '89' }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, optionally with a prerelease suffix." >&2
            exit 1
          fi

      - name: Show GPU and CUDA tools
        run: |
          nvidia-smi
          nvcc --version
          cmake --version

      - name: Build and verify full example baseline
        run: scripts/verify_examples.sh
        env:
          HELIX_BUILD_DIR: ${{ runner.temp }}/helix-release-build
          HELIX_RUN_DIR: ${{ runner.temp }}/helix-release-run

      - name: Package release
        run: scripts/package_release.sh "${RELEASE_TAG}"
        env:
          HELIX_BUILD_DIR: ${{ runner.temp }}/helix-release-build
          HELIX_DIST_DIR: ${{ runner.temp }}/helix-dist

      - name: Attest release package
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/helix-dist/*.tar.gz

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: helix-release-package
          path: |
            ${{ runner.temp }}/helix-dist/*.tar.gz
            ${{ runner.temp }}/helix-dist/*.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload release verification outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: helix-release-verification-output
          path: |
            ${{ runner.temp }}/helix-release-run/output*.txt
            ${{ runner.temp }}/helix-release-run/snapshot_rho*.dat
          if-no-files-found: ignore
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: helix-release-package
          path: dist

      - name: Publish release
        run: |
          prerelease_args=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GH_REPO}"
            gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --draft=false "${prerelease_args[@]}"
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "HELIX ${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi

  publish-docs:
    name: Publish release documentation
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve documentation version
        run: |
          echo "HELIX_DOCS_VERSION=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "HELIX_DOCS_VERSION_LABEL=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "Resolved documentation version: ${RELEASE_TAG}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen

      - name: Build HTML with warnings as errors
        run: make -C doc html SPHINXOPTS="-W --keep-going"

      - name: Prepare gh-pages storage
        run: |
          site_dir="${RUNNER_TEMP}/helix-pages-site"
          rm -rf "${site_dir}"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git worktree add --detach "${site_dir}" origin/gh-pages
          else
            git worktree add --orphan gh-pages "${site_dir}"
          fi
          echo "HELIX_PAGES_SITE=${site_dir}" >> "${GITHUB_ENV}"

      - name: Stage release documentation
        run: |
          python scripts/stage_docs_site.py \
            --site-dir "${HELIX_PAGES_SITE}" \
            --docs-dir doc/build/html \
            --version "${RELEASE_TAG}"

      - name: Persist gh-pages storage
        run: |
          git -C "${HELIX_PAGES_SITE}" config user.name "github-actions[bot]"
          git -C "${HELIX_PAGES_SITE}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${HELIX_PAGES_SITE}" add -A
          if git -C "${HELIX_PAGES_SITE}" diff --cached --quiet; then
            echo "No documentation changes to persist."
          else
            git -C "${HELIX_PAGES_SITE}" commit -m "docs: publish ${RELEASE_TAG} documentation"
            git -C "${HELIX_PAGES_SITE}" push origin HEAD:gh-pages
          fi

      - name: Prepare Pages artifact payload
        run: |
          pages_artifact="${RUNNER_TEMP}/helix-pages-artifact"
          rm -rf "${pages_artifact}"
          mkdir -p "${pages_artifact}"
          cp -a "${HELIX_PAGES_SITE}/." "${pages_artifact}/"
          rm -rf "${pages_artifact}/.git"
          echo "HELIX_PAGES_ARTIFACT=${pages_artifact}" >> "${GITHUB_ENV}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.HELIX_PAGES_ARTIFACT }}
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
