name: CUDA CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      helix_steps:
        description: HELIX_STEPS value for smoke run
        required: true
        default: "2"
        type: string
      cuda_architectures:
        description: CMake CUDA architecture list
        required: true
        default: "89"
        type: string
      run_sanitizer:
        description: Run compute-sanitizer memcheck profile
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: cuda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-ci:
    name: Build and test on CUDA runner
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      HELIX_STEPS: ${{ github.event.inputs.helix_steps || '2' }}
      HELIX_CUDA_ARCHITECTURES: ${{ github.event.inputs.cuda_architectures || '89' }}
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Configure CUDA 13.2 toolkit environment
        run: |
          CUDA_DIR=/usr/local/cuda-13.2
          if [[ ! -x "${CUDA_DIR}/bin/nvcc" ]]; then
            echo "Expected CUDA 13.2 toolkit at ${CUDA_DIR}/bin/nvcc but it is missing." >&2
            exit 1
          fi
          echo "${CUDA_DIR}/bin" >> "${GITHUB_PATH}"
          {
            echo "CUDA_HOME=${CUDA_DIR}"
            echo "CUDA_PATH=${CUDA_DIR}"
            echo "CUDACXX=${CUDA_DIR}/bin/nvcc"
            echo "LD_LIBRARY_PATH=${CUDA_DIR}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Show GPU and CUDA tools
        run: |
          nvidia-smi
          nvcc --version
          cmake --version

      - name: Set CUDA CI runtime paths
        run: |
          {
            echo "HELIX_BUILD_DIR=${RUNNER_TEMP}/helix-build"
            echo "HELIX_RUN_DIR=${RUNNER_TEMP}/helix-run"
            echo "HELIX_BENCHMARK_OUTPUT_DIR=${RUNNER_TEMP}/helix-benchmark"
          } >> "${GITHUB_ENV}"

      - name: Configure
        run: cmake -S . -B "${HELIX_BUILD_DIR}" -DCMAKE_BUILD_TYPE=Release -DHELIX_CUDA_ARCHITECTURES="${HELIX_CUDA_ARCHITECTURES}"

      - name: Build
        run: cmake --build "${HELIX_BUILD_DIR}" --parallel "$(nproc)"

      - name: Run ordinary CTest suite
        run: ctest --test-dir "${HELIX_BUILD_DIR}" --output-on-failure -LE "^(sanitizer|benchmark)$"

      - name: Verify script compatibility smoke
        run: scripts/verify_examples.sh

      - name: Upload CUDA CI outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cuda-ci-output
          path: |
            ${{ runner.temp }}/helix-run/output*.txt
            ${{ runner.temp }}/helix-run/snapshot_rho*.dat
            ${{ runner.temp }}/helix-run/energy_compare_summary.txt
            ${{ runner.temp }}/helix-build/helix-smoke-integration/**/output*.txt
            ${{ runner.temp }}/helix-build/helix-smoke-integration/**/snapshot_rho*.dat
            ${{ runner.temp }}/helix-build/Testing/Temporary/LastTest.log
            ${{ runner.temp }}/helix-build/Testing/Temporary/LastTestsFailed.log
          if-no-files-found: ignore
          retention-days: 7

  cuda-sanitizer:
    name: CUDA memcheck sanitizer
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_sanitizer == 'true' }}
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      HELIX_CUDA_ARCHITECTURES: ${{ github.event.inputs.cuda_architectures || '89' }}
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Configure CUDA 13.2 toolkit environment
        run: |
          CUDA_DIR=/usr/local/cuda-13.2
          if [[ ! -x "${CUDA_DIR}/bin/nvcc" ]]; then
            echo "Expected CUDA 13.2 toolkit at ${CUDA_DIR}/bin/nvcc but it is missing." >&2
            exit 1
          fi
          if [[ ! -x "${CUDA_DIR}/bin/compute-sanitizer" ]]; then
            echo "Expected compute-sanitizer at ${CUDA_DIR}/bin/compute-sanitizer but it is missing." >&2
            exit 1
          fi
          echo "${CUDA_DIR}/bin" >> "${GITHUB_PATH}"
          {
            echo "CUDA_HOME=${CUDA_DIR}"
            echo "CUDA_PATH=${CUDA_DIR}"
            echo "CUDACXX=${CUDA_DIR}/bin/nvcc"
            echo "LD_LIBRARY_PATH=${CUDA_DIR}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Show GPU and CUDA tools
        run: |
          nvidia-smi
          nvcc --version
          compute-sanitizer --version
          cmake --version

      - name: Set sanitizer runtime paths
        run: |
          {
            echo "HELIX_BUILD_DIR=${RUNNER_TEMP}/helix-sanitizer-build"
            echo "HELIX_SANITIZER_REPORT_DIR=${RUNNER_TEMP}/helix-sanitizer-reports"
          } >> "${GITHUB_ENV}"

      - name: Configure
        run: cmake -S . -B "${HELIX_BUILD_DIR}" -DCMAKE_BUILD_TYPE=Release -DHELIX_CUDA_ARCHITECTURES="${HELIX_CUDA_ARCHITECTURES}"

      - name: Build
        run: cmake --build "${HELIX_BUILD_DIR}" --parallel "$(nproc)"

      - name: Run sanitizer CTest label
        run: ctest --test-dir "${HELIX_BUILD_DIR}" -L sanitizer --output-on-failure

      - name: Upload sanitizer reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cuda-sanitizer-reports
          path: |
            ${{ runner.temp }}/helix-sanitizer-reports/*.log
            ${{ runner.temp }}/helix-sanitizer-reports/*.txt
            ${{ runner.temp }}/helix-sanitizer-build/Testing/Temporary/LastTest.log
            ${{ runner.temp }}/helix-sanitizer-build/Testing/Temporary/LastTestsFailed.log
          if-no-files-found: ignore
          retention-days: 7
